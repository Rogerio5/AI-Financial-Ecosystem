name: BankPy CI

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*.*.*'   # dispara quando você criar uma tag como v1.0.0
  pull_request:
    branches: [ "master" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install flake8 black

      - name: Run lint
        run: |
          flake8 .
          black --check .

  build-and-test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start services
        run: docker-compose up -d --build

      - name: Apply migrations
        run: docker-compose run --rm app alembic upgrade head

      - name: Apply seed
        run: docker-compose run --rm app python cli.py seed

      - name: Run ETL
        run: docker-compose run --rm app python cli.py gerar-etl

      - name: Run tests with coverage
        run: docker-compose run --rm app pytest -v --cov=bankpy --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Shutdown
        if: always()
        run: docker-compose down

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: image
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/bankpy-app:latest
          format: table
          exit-code: 1
          ignore-unfixed: true

  publish-docker:
    runs-on: ubuntu-latest
    needs: security-scan   # só roda se os testes e scan passarem
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bankpy-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bankpy-app:${{ github.ref_name }}

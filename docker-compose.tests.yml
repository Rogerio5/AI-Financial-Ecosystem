version: "3.9"

services:
  test:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+psycopg2://bankpy_user:${POSTGRES_PASSWORD}@db:5432/bankpy_test"
    volumes:
      - .:/app
    working_dir: /app
    command: pytest -v

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: bankpy_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: bankpy_test
    volumes:
      - db_data_test:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankpy_user -d bankpy_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

volumes:
  db_data_test:
